<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kananke Hills · Villa Manager</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #192132 100%);
            min-height: 100vh;
            padding: 1rem;
            position: relative;
        }

        /* Cool background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ===== COOL HEADER WITH GLASS EFFECT ===== */
        .header {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
        }

        @media (min-width: 768px) {
            .header h1 {
                font-size: 2.4rem;
            }
        }

        .header h1 span {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* ===== COOL STATS CARDS ===== */
        .stats-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            display: flex;
            gap: 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
        }

        .stat-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: -0.75rem;
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
        }

        .stat-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 15px currentColor;
        }

        .stat-dot.villa1 { 
            background: #3b82f6; 
            box-shadow: 0 0 15px #3b82f6;
        }
        .stat-dot.villa2 { 
            background: #8b5cf6; 
            box-shadow: 0 0 15px #8b5cf6;
        }
        .stat-dot.villa3 { 
            background: #ec4899; 
            box-shadow: 0 0 15px #ec4899;
        }

        .stat-label {
            font-weight: 500;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .stat-number {
            font-weight: 700;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ===== MAIN GRID ===== */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                display: grid;
                grid-template-columns: 400px 1fr;
            }
        }

        /* ===== COOL BOOKING CARD ===== */
        .booking-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 1024px) {
            .booking-card {
                position: sticky;
                top: 1.5rem;
                height: fit-content;
            }
        }

        .booking-card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .booking-card h2 svg {
            width: 24px;
            height: 24px;
            color: #3b82f6;
            filter: drop-shadow(0 0 10px #3b82f6);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ===== FIXED DATE SELECTORS - NO OVERFLOW ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s;
            color: white;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group select option {
            background: #1e293b;
            color: white;
        }

        /* Fix for date inputs - they stay in box now */
        .form-group input[type="date"] {
            color-scheme: dark;
            min-width: 0;
            width: 100%;
        }

        .form-group input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }

        .form-group input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Fixed date grid - no overflow */
        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            width: 100%;
        }

        .date-grid .form-group {
            min-width: 0; /* Prevents overflow */
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px #2563eb80;
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -5px #2563eb;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #475569;
            box-shadow: none;
        }

        .conflict-warning {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 1rem;
            margin: 1.5rem 0 0;
            display: none;
            align-items: center;
            gap: 0.75rem;
            color: #f87171;
            font-weight: 500;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
        }

        .conflict-warning.show {
            display: flex;
        }

        /* ===== COOL MESSAGES ===== */
        .message {
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            border: 1px solid;
        }

        .message.show {
            display: flex;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        /* ===== VIEWS CONTAINER ===== */
        .views-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .view-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .view-tab {
            padding: 0.75rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            border: none;
            color: #94a3b8;
            position: relative;
        }

        .view-tab::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: #3b82f6;
            transition: width 0.3s;
        }

        .view-tab.active {
            color: white;
        }

        .view-tab.active::after {
            width: 50%;
        }

        /* ===== COOL CALENDAR ===== */
        .calendar-view {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 20px;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            overflow: hidden;
        }

        .calendar-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem 0.5rem;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.9rem;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .calendar-table td {
            border: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: top;
            padding: 0;
        }

        .villa-cell {
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: white;
            text-align: center;
            width: 120px;
            padding: 1rem 0.5rem;
            border-right: 2px solid rgba(255, 255, 255, 0.1) !important;
        }

        .villa-name {
            display: block;
            font-size: 1rem;
            margin-bottom: 0.2rem;
        }
        
        .villa-subname {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
        }

        .bookings-container {
            min-height: 100px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .calendar-booking {
            color: white;
            padding: 0.35rem 0.5rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calendar-booking.villa1 { 
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }
        .calendar-booking.villa2 { 
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        .calendar-booking.villa3 { 
            background: linear-gradient(135deg, #ec4899, #db2777);
        }

        .calendar-booking:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* ===== COOL TIMELINE ===== */
        .timeline-view {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .timeline-container {
            min-width: 600px;
        }

        .timeline-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            font-weight: 600;
            color: #94a3b8;
            padding: 0 0.5rem;
        }

        .timeline-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timeline-villa {
            width: 120px;
            font-weight: 600;
            color: white;
            font-size: 0.95rem;
            flex-shrink: 0;
            padding: 0.5rem 0;
        }
        
        .timeline-villa small {
            display: block;
            font-weight: 400;
            color: #94a3b8;
            font-size: 0.7rem;
            margin-top: 0.2rem;
        }

        .timeline-bars {
            flex: 1;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .timeline-bar {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .timeline-bar.villa2 { 
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        .timeline-bar.villa3 { 
            background: linear-gradient(135deg, #ec4899, #db2777);
        }

        .date-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            backdrop-filter: blur(5px);
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            font-size: 1.1rem;
            margin-left: 0.25rem;
            padding: 0.2rem 0.5rem;
            transition: all 0.2s;
            border-radius: 50%;
        }

        .delete-btn:hover {
            color: white;
            background: rgba(0, 0, 0, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #94a3b8;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }

        /* ===== LOADING ANIMATION ===== */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TOUCH OPTIMIZATIONS ===== */
        @media (max-width: 768px) {
            body {
                padding: 0.75rem;
            }
            
            .header {
                padding: 1.25rem;
            }
            
            .stats-card {
                padding: 0.5rem 1rem;
            }
            
            .booking-card, .views-container {
                padding: 1.5rem;
            }
            
            input, select, button {
                font-size: 16px !important;
            }
            
            .date-grid {
                gap: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header with stats -->
        <div class="header">
            <h1>Kananke Hills <span>Villa Manager</span></h1>
            <div class="stats-card">
                <div class="stat-item">
                    <span class="stat-dot villa1"></span>
                    <span class="stat-label">Jasmin</span>
                    <span class="stat-number" id="villa1-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-dot villa2"></span>
                    <span class="stat-label">Orchid</span>
                    <span class="stat-number" id="villa2-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-dot villa3"></span>
                    <span class="stat-label">Rose</span>
                    <span class="stat-number" id="villa3-count">0</span>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="error-message" class="message error-message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="error-text"></span>
        </div>

        <div id="success-message" class="message success-message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 6L9 17L4 12"></path>
            </svg>
            <span id="success-text"></span>
        </div>

        <!-- Main dashboard -->
        <div class="dashboard-grid">
            <!-- Booking form -->
            <div class="booking-card">
                <h2>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    New Booking
                </h2>
                <div class="subtitle">Add a reservation for your luxury villas</div>

                <div class="form-group">
                    <label>Guest name</label>
                    <input type="text" id="name" placeholder="e.g., John Smith" autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Select villa</label>
                    <select id="villa">
                        <option value="Villa 1 - Jasmin">🌸 Jasmin · Ocean View</option>
                        <option value="Villa 2 - Orchid">🌺 Orchid · Garden Suite</option>
                        <option value="Villa 3 - Rose">🌹 Rose · Pool House</option>
                    </select>
                </div>

                <!-- FIXED DATE GRID - NO OVERFLOW -->
                <div class="date-grid">
                    <div class="form-group">
                        <label>Check-in</label>
                        <input type="date" id="start">
                    </div>
                    <div class="form-group">
                        <label>Check-out</label>
                        <input type="date" id="end">
                    </div>
                </div>

                <div id="conflict-warning" class="conflict-warning">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span>This villa is already booked for these dates</span>
                </div>

                <button class="btn-primary" id="add-btn">➕ Add Booking</button>
            </div>

            <!-- Views -->
            <div class="views-container">
                <div class="view-tabs">
                    <button class="view-tab active" data-view="calendar">📅 Calendar View</button>
                    <button class="view-tab" data-view="timeline">📊 Timeline View</button>
                </div>

                <!-- Calendar view -->
                <div id="calendar-view" class="calendar-view">
                    <table class="calendar-table" id="calendar-table">
                        <!-- Calendar rendered by JS -->
                    </table>
                </div>

                <!-- Timeline view -->
                <div id="timeline-view" class="timeline-view" style="display: none;">
                    <div class="timeline-container" id="timeline-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase
        const supabaseClient = window.supabase.createClient(
            "https://ttspzbtmblvxqinnrpzm.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0c3B6YnRtYmx2eHFpbm5ycHptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNjI1MDgsImV4cCI6MjA4NzgzODUwOH0.L0OIJDXBKEHSWoZqVOUWGZh1XGStb5MfqWB3L_nM8pE"
        );

        // State
        let allBookings = [];
        let currentView = 'calendar';

        // DOM Elements
        const nameInput = document.getElementById('name');
        const villaSelect = document.getElementById('villa');
        const startInput = document.getElementById('start');
        const endInput = document.getElementById('end');
        const addBtn = document.getElementById('add-btn');
        const conflictWarning = document.getElementById('conflict-warning');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const successMessage = document.getElementById('success-message');
        const successText = document.getElementById('success-text');
        const calendarView = document.getElementById('calendar-view');
        const timelineView = document.getElementById('timeline-view');
        const calendarTable = document.getElementById('calendar-table');
        const timelineGrid = document.getElementById('timeline-grid');

        // Set default dates
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        startInput.value = today.toISOString().split('T')[0];
        endInput.value = tomorrow.toISOString().split('T')[0];

        // Helper functions
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 4000);
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => successMessage.classList.remove('show'), 3000);
        }

        // Check for conflicts
        function checkConflicts() {
            const villa = villaSelect.value;
            const start = startInput.value;
            const end = endInput.value;
            
            if (!start || !end || !villa) return false;

            const conflict = allBookings.some(booking => {
                if (booking.villa !== villa) return false;
                
                const bookingStart = new Date(booking.start_date);
                const bookingEnd = new Date(booking.end_date);
                const checkStart = new Date(start);
                const checkEnd = new Date(end);
                
                return (checkStart < bookingEnd && checkEnd > bookingStart);
            });

            if (conflict) {
                conflictWarning.classList.add('show');
                addBtn.disabled = true;
            } else {
                conflictWarning.classList.remove('show');
                addBtn.disabled = false;
            }
            
            return conflict;
        }

        // Load bookings
        async function loadBookings() {
            try {
                const { data, error } = await supabaseClient
                    .from("bookings")
                    .select("*")
                    .order("start_date", { ascending: true });

                if (error) {
                    showError('Failed to load bookings: ' + error.message);
                    return;
                }

                allBookings = data || [];
                updateStats();
                renderCurrentView();
                checkConflicts();
                
            } catch (err) {
                showError('Failed to connect to database');
            }
        }

        // Update stats
        function updateStats() {
            const villa1 = allBookings.filter(b => b.villa === 'Villa 1 - Jasmin').length;
            const villa2 = allBookings.filter(b => b.villa === 'Villa 2 - Orchid').length;
            const villa3 = allBookings.filter(b => b.villa === 'Villa 3 - Rose').length;
            
            document.getElementById('villa1-count').textContent = villa1;
            document.getElementById('villa2-count').textContent = villa2;
            document.getElementById('villa3-count').textContent = villa3;
        }

        // Add booking
        async function addBooking() {
            try {
                const name = nameInput.value.trim();
                const villa = villaSelect.value;
                const start = startInput.value;
                const end = endInput.value;

                if (!name) {
                    showError('Please enter guest name');
                    return;
                }

                if (!start || !end) {
                    showError('Please select dates');
                    return;
                }

                const startDate = new Date(start);
                const endDate = new Date(end);
                
                if (endDate <= startDate) {
                    showError('Check-out must be after check-in');
                    return;
                }

                if (checkConflicts()) {
                    showError('Cannot add: Villa is already booked for these dates');
                    return;
                }

                const { error } = await supabaseClient
                    .from("bookings")
                    .insert([{
                        guest_name: name,
                        villa: villa,
                        start_date: start,
                        end_date: end
                    }]);

                if (error) {
                    showError('Failed to add booking: ' + error.message);
                    return;
                }

                showSuccess('Booking added successfully!');

                nameInput.value = '';
                
                const newToday = new Date();
                const newTomorrow = new Date(newToday);
                newTomorrow.setDate(newTomorrow.getDate() + 1);
                startInput.value = newToday.toISOString().split('T')[0];
                endInput.value = newTomorrow.toISOString().split('T')[0];
                
                await loadBookings();
                
            } catch (err) {
                showError('An unexpected error occurred');
            }
        }

        // Delete booking
        async function deleteBooking(id) {
            if (!confirm('Delete this booking?')) return;
            
            try {
                const { error } = await supabaseClient
                    .from("bookings")
                    .delete()
                    .eq("id", id);

                if (error) {
                    showError('Failed to delete booking');
                    return;
                }

                showSuccess('Booking deleted');
                await loadBookings();
                
            } catch (err) {
                showError('Failed to delete booking');
            }
        }

        // Render calendar
        function renderCalendar() {
            const dates = [];
            const today = new Date();
            for (let i = 0; i < 14; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                dates.push(date);
            }

            const villas = [
                { name: 'Villa 1 - Jasmin', display: 'Jasmin', icon: '🌸', sub: 'Ocean View' },
                { name: 'Villa 2 - Orchid', display: 'Orchid', icon: '🌺', sub: 'Garden Suite' },
                { name: 'Villa 3 - Rose', display: 'Rose', icon: '🌹', sub: 'Pool House' }
            ];
            
            const villaColors = ['villa1', 'villa2', 'villa3'];

            let html = '<thead><tr><th>Villa</th>';

            dates.forEach(date => {
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = date.getDate();
                const month = date.toLocaleDateString('en-US', { month: 'short' });
                html += `<th>${dayName}<br><span style="font-weight:400; font-size:0.7rem; color:#94a3b8;">${month} ${dayNum}</span></th>`;
            });
            html += '</tr></thead><tbody>';

            villas.forEach((villa, villaIndex) => {
                html += '<tr>';
                html += `<td class="villa-cell"><span class="villa-name">${villa.icon} ${villa.display}</span><span class="villa-subname">${villa.sub}</span></td>`;

                dates.forEach(date => {
                    const dateStr = date.toISOString().split('T')[0];
                    
                    const dayBookings = allBookings.filter(b => 
                        b.villa === villa.name && 
                        dateStr >= b.start_date && 
                        dateStr <= b.end_date
                    );

                    html += '<td>';
                    html += '<div class="bookings-container">';

                    if (dayBookings.length > 0) {
                        dayBookings.forEach(booking => {
                            const isStart = dateStr === booking.start_date;
                            
                            html += `<div class="calendar-booking ${villaColors[villaIndex]}" onclick="window.deleteBooking(${booking.id})" title="Click to delete">`;
                            if (isStart) html += '📌 ';
                            html += booking.guest_name;
                            html += '</div>';
                        });
                    } else {
                        html += '<div style="height: 24px;"></div>';
                    }

                    html += '</div>';
                    html += '</td>';
                });

                html += '</tr>';
            });

            html += '</tbody>';
            calendarTable.innerHTML = html;
        }

        // Render timeline
        function renderTimeline() {
            if (allBookings.length === 0) {
                timelineGrid.innerHTML = '<div class="empty-state">✨ No bookings yet — add your first reservation</div>';
                return;
            }

            const villas = [
                { name: 'Villa 1 - Jasmin', display: 'Jasmin', icon: '🌸', sub: 'Ocean View', class: 'villa1' },
                { name: 'Villa 2 - Orchid', display: 'Orchid', icon: '🌺', sub: 'Garden Suite', class: 'villa2' },
                { name: 'Villa 3 - Rose', display: 'Rose', icon: '🌹', sub: 'Pool House', class: 'villa3' }
            ];
            
            let html = '<div class="timeline-header"><div style="width:120px"></div><div>Upcoming Stays</div></div>';

            villas.forEach(villa => {
                const villaBookings = allBookings
                    .filter(b => b.villa === villa.name)
                    .sort((a, b) => new Date(a.start_date) - new Date(b.start_date));

                if (villaBookings.length === 0) return;

                html += '<div class="timeline-row">';
                html += `<div class="timeline-villa">${villa.icon} ${villa.display}<small>${villa.sub}</small></div>`;
                html += '<div class="timeline-bars">';

                villaBookings.forEach(booking => {
                    const start = new Date(booking.start_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    const end = new Date(booking.end_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    
                    html += `<div class="timeline-bar ${villa.class}">`;
                    html += `<span class="date-badge">${start} → ${end}</span>`;
                    html += booking.guest_name;
                    html += `<button class="delete-btn" onclick="window.deleteBooking(${booking.id})" title="Delete booking">✕</button>`;
                    html += '</div>';
                });

                html += '</div></div>';
            });

            timelineGrid.innerHTML = html;
        }

        // Render current view
        function renderCurrentView() {
            if (currentView === 'calendar') {
                renderCalendar();
            } else {
                renderTimeline();
            }
        }

        // Switch view
        function switchView(view) {
            currentView = view;
            
            document.querySelectorAll('.view-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-view="${view}"]`).classList.add('active');
            
            calendarView.style.display = view === 'calendar' ? 'block' : 'none';
            timelineView.style.display = view === 'timeline' ? 'block' : 'none';
            
            renderCurrentView();
        }

        // Event listeners
        addBtn.addEventListener('click', addBooking);
        
        villaSelect.addEventListener('change', checkConflicts);
        startInput.addEventListener('change', checkConflicts);
        endInput.addEventListener('change', checkConflicts);
        
        document.querySelectorAll('.view-tab').forEach(tab => {
            tab.addEventListener('click', () => switchView(tab.dataset.view));
        });

        // Make functions available globally
        window.deleteBooking = deleteBooking;
        window.addBooking = addBooking;

        // Initialize
        loadBookings();
    </script>
</body>
</html>
