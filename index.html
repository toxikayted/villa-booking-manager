<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
    <title>Kananke Hills · Villa Manager</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..700;1,14..32,400..700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html {
            background: #0b1120;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0b1120 0%, #192132 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            padding: 1rem;
            position: relative;
            margin: 0;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: touch;
            color: white;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0b1120;
            z-index: -2;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .header {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 1.5rem;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        @media (min-width: 768px) {
            .header h1 {
                font-size: 2.2rem;
            }
        }

        .header h1 span {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* ===== STATS ===== */
        .stats-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1.25rem;
            border-radius: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 1.5rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 480px) {
            .stats-card {
                flex-wrap: nowrap;
            }
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }

        .stat-label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stat-label.villa1 {
            color: #3b82f6;
            text-shadow: 0 0 10px #3b82f680;
        }
        .stat-label.villa2 {
            color: #8b5cf6;
            text-shadow: 0 0 10px #8b5cf680;
        }
        .stat-label.villa3 {
            color: #ec4899;
            text-shadow: 0 0 10px #ec489980;
        }

        .stat-number {
            font-weight: 700;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 2.2rem;
            text-align: center;
        }

        /* ===== MAIN GRID ===== */
        .dashboard-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex: 1;
        }

        @media (min-width: 1024px) {
            .dashboard-grid {
                display: grid;
                grid-template-columns: 400px 1fr;
            }
        }

        /* ===== BOOKING CARD ===== */
        .booking-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 1024px) {
            .booking-card {
                position: sticky;
                top: 1.5rem;
                height: fit-content;
                padding: 2rem;
            }
        }

        .booking-card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .booking-card h2 svg {
            width: 24px;
            height: 24px;
            color: #3b82f6;
            filter: drop-shadow(0 0 10px #3b82f6);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.4rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s;
            color: white;
            -webkit-appearance: none;
            appearance: none;
        }

        .form-group select option {
            background: #1e293b;
            color: white;
        }

        .form-group input[type="date"] {
            color-scheme: dark;
            min-width: 0;
            width: 100%;
        }

        .form-group input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            opacity: 0.5;
            cursor: pointer;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            background: rgba(59, 130, 246, 0.1);
        }

        .date-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px #2563eb80;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #475569;
            box-shadow: none;
        }

        .conflict-warning {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 0.75rem 1rem;
            margin: 1.25rem 0 0;
            display: none;
            align-items: center;
            gap: 0.75rem;
            color: #f87171;
            font-weight: 500;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .conflict-warning.show {
            display: flex;
        }

        /* ===== MESSAGES ===== */
        .message {
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px solid;
        }

        .message.show {
            display: flex;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        /* ===== VIEWS ===== */
        .views-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        @media (min-width: 768px) {
            .views-container {
                padding: 2rem;
            }
        }

        .view-tabs {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .view-tab {
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            border: none;
            color: #94a3b8;
            white-space: nowrap;
        }

        .view-tab.active {
            color: white;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* ===== FIXED CALENDAR WITH VERTICALLY CENTERED VILLA NAMES ===== */
        .calendar-view {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 20px;
        }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            overflow: hidden;
        }

        .calendar-table th {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 0.25rem;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.8rem;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .calendar-table td {
            border: 1px solid rgba(255, 255, 255, 0.05);
            vertical-align: top;
            padding: 0;
        }

        /* Fixed villa cell with vertical centering */
        .villa-cell {
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: white;
            text-align: center;
            vertical-align: middle !important; /* Force vertical middle */
            width: 100px;
            height: 100%; /* Take full height */
            padding: 0;
            border-right: 2px solid rgba(255, 255, 255, 0.1) !important;
        }

        /* Container for villa name to ensure proper centering */
        .villa-cell-content {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 80px; /* Match bookings container min-height */
            width: 100%;
            padding: 0.5rem;
        }

        .villa-name {
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.4;
        }

        .bookings-container {
            min-height: 80px;
            padding: 0.35rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .calendar-booking {
            color: white;
            padding: 0.25rem 0.35rem;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: left;
        }

        .calendar-booking.villa1 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .calendar-booking.villa2 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .calendar-booking.villa3 { background: linear-gradient(135deg, #ec4899, #db2777); }

        .calendar-booking:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* ===== TIMELINE ===== */
        .timeline-view {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .timeline-container {
            min-width: 500px;
        }

        .timeline-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: #94a3b8;
            padding: 0 0.5rem;
        }

        .timeline-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .timeline-villa {
            width: 100px;
            font-weight: 600;
            color: white;
            font-size: 0.85rem;
            flex-shrink: 0;
            padding: 0.5rem 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timeline-bars {
            flex: 1;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .timeline-bar {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 0.5rem 0.75rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .timeline-bar.villa2 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .timeline-bar.villa3 { background: linear-gradient(135deg, #ec4899, #db2777); }

        .timeline-bar:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        .date-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 0.15rem 0.5rem;
            border-radius: 30px;
            font-size: 0.65rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: #94a3b8;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: white;
        }

        .modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .modal-close:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .modal-body {
            margin-bottom: 2rem;
        }

        .modal-detail {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 0.75rem;
        }

        .modal-detail-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .modal-detail-icon.villa1 { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .modal-detail-icon.villa2 { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
        .modal-detail-icon.villa3 { background: rgba(236, 72, 153, 0.2); color: #ec4899; }

        .modal-detail-content {
            flex: 1;
        }

        .modal-detail-label {
            font-size: 0.7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modal-detail-value {
            font-size: 1rem;
            font-weight: 600;
            color: white;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-align: center;
        }

        .modal-btn.delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .modal-btn.delete:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== IPHONE OPTIMIZATIONS ===== */
        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
                background-attachment: fixed;
            }
            
            .header {
                padding: 1rem;
                border-radius: 30px;
                margin-bottom: 1.5rem;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .stats-card {
                padding: 0.6rem 1rem;
                gap: 0.75rem 1rem;
            }
            
            .stat-label {
                font-size: 0.8rem;
            }
            
            .stat-number {
                padding: 0.15rem 0.5rem;
                font-size: 0.75rem;
                min-width: 1.8rem;
            }
            
            .booking-card, .views-container {
                padding: 1.25rem;
                border-radius: 24px;
            }
            
            .modal-content {
                padding: 1.5rem;
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(1rem, env(safe-area-inset-left));
                padding-right: max(1rem, env(safe-area-inset-right));
                padding-top: max(1rem, env(safe-area-inset-top));
                padding-bottom: max(1rem, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <h1>Kananke Hills <span>Villa Manager</span></h1>
            <div class="stats-card">
                <div class="stat-item">
                    <span class="stat-label villa1">Jasmin</span>
                    <span class="stat-number" id="villa1-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label villa2">Orchid</span>
                    <span class="stat-number" id="villa2-count">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label villa3">Rose</span>
                    <span class="stat-number" id="villa3-count">0</span>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="error-message" class="message error-message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="error-text"></span>
        </div>

        <div id="success-message" class="message success-message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 6L9 17L4 12"></path>
            </svg>
            <span id="success-text"></span>
        </div>

        <!-- Main dashboard -->
        <div class="dashboard-grid">
            <!-- Booking form -->
            <div class="booking-card">
                <h2>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    New Booking
                </h2>
                <div class="subtitle">Add a reservation</div>

                <div class="form-group">
                    <label>Guest name</label>
                    <input type="text" id="name" placeholder="e.g., John Smith" autocomplete="off">
                </div>

                <div class="form-group">
                    <label>Select villa</label>
                    <select id="villa">
                        <option value="Villa 1 - Jasmin">🌸 Jasmin</option>
                        <option value="Villa 2 - Orchid">🌺 Orchid</option>
                        <option value="Villa 3 - Rose">🌹 Rose</option>
                    </select>
                </div>

                <div class="date-grid">
                    <div class="form-group">
                        <label>Check-in</label>
                        <input type="date" id="start">
                    </div>
                    <div class="form-group">
                        <label>Check-out</label>
                        <input type="date" id="end">
                    </div>
                </div>

                <div id="conflict-warning" class="conflict-warning">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span>Already booked for these dates</span>
                </div>

                <button class="btn-primary" id="add-btn">➕ Add Booking</button>
            </div>

            <!-- Views -->
            <div class="views-container">
                <div class="view-tabs">
                    <button class="view-tab active" data-view="calendar">📅 Calendar</button>
                    <button class="view-tab" data-view="timeline">📊 Timeline</button>
                </div>

                <!-- Calendar view -->
                <div id="calendar-view" class="calendar-view">
                    <table class="calendar-table" id="calendar-table"></table>
                </div>

                <!-- Timeline view -->
                <div id="timeline-view" class="timeline-view" style="display: none;">
                    <div class="timeline-container" id="timeline-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content" id="modal-content">
            <div class="modal-header">
                <h3>Booking Details</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Filled by JavaScript -->
            </div>
            <div class="modal-actions">
                <button class="modal-btn delete" id="modal-delete-btn">Delete Booking</button>
                <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Supabase
        const supabaseClient = window.supabase.createClient(
            "https://ttspzbtmblvxqinnrpzm.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0c3B6YnRtYmx2eHFpbm5ycHptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNjI1MDgsImV4cCI6MjA4NzgzODUwOH0.L0OIJDXBKEHSWoZqVOUWGZh1XGStb5MfqWB3L_nM8pE"
        );

        // State
        let allBookings = [];
        let currentView = 'calendar';
        let selectedBookingId = null;

        // DOM Elements
        const nameInput = document.getElementById('name');
        const villaSelect = document.getElementById('villa');
        const startInput = document.getElementById('start');
        const endInput = document.getElementById('end');
        const addBtn = document.getElementById('add-btn');
        const conflictWarning = document.getElementById('conflict-warning');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const successMessage = document.getElementById('success-message');
        const successText = document.getElementById('success-text');
        const calendarView = document.getElementById('calendar-view');
        const timelineView = document.getElementById('timeline-view');
        const calendarTable = document.getElementById('calendar-table');
        const timelineGrid = document.getElementById('timeline-grid');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalBody = document.getElementById('modal-body');
        const modalDeleteBtn = document.getElementById('modal-delete-btn');

        // Set default dates
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        startInput.value = today.toISOString().split('T')[0];
        endInput.value = tomorrow.toISOString().split('T')[0];

        // Helper functions
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 4000);
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => successMessage.classList.remove('show'), 3000);
        }

        // Modal functions
        function openModal(bookingId) {
            selectedBookingId = bookingId;
            const booking = allBookings.find(b => b.id === bookingId);
            if (!booking) return;

            const villaNum = booking.villa.split(' - ')[0];
            const villaName = booking.villa.split(' - ')[1];
            let villaClass = 'villa1';
            if (villaName === 'Orchid') villaClass = 'villa2';
            if (villaName === 'Rose') villaClass = 'villa3';

            const startDate = new Date(booking.start_date).toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            const endDate = new Date(booking.end_date).toLocaleDateString('en-US', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });

            modalBody.innerHTML = `
                <div class="modal-detail">
                    <div class="modal-detail-icon ${villaClass}">${villaName === 'Jasmin' ? '🌸' : villaName === 'Orchid' ? '🌺' : '🌹'}</div>
                    <div class="modal-detail-content">
                        <div class="modal-detail-label">Villa</div>
                        <div class="modal-detail-value">${villaName}</div>
                    </div>
                </div>
                <div class="modal-detail">
                    <div class="modal-detail-icon ${villaClass}">👤</div>
                    <div class="modal-detail-content">
                        <div class="modal-detail-label">Guest</div>
                        <div class="modal-detail-value">${booking.guest_name}</div>
                    </div>
                </div>
                <div class="modal-detail">
                    <div class="modal-detail-icon ${villaClass}">📅</div>
                    <div class="modal-detail-content">
                        <div class="modal-detail-label">Check-in</div>
                        <div class="modal-detail-value">${startDate}</div>
                    </div>
                </div>
                <div class="modal-detail">
                    <div class="modal-detail-icon ${villaClass}">📅</div>
                    <div class="modal-detail-content">
                        <div class="modal-detail-label">Check-out</div>
                        <div class="modal-detail-value">${endDate}</div>
                    </div>
                </div>
            `;

            modalOverlay.classList.add('show');
        }

        function closeModal() {
            modalOverlay.classList.remove('show');
            selectedBookingId = null;
        }

        // Check for conflicts
        function checkConflicts() {
            const villa = villaSelect.value;
            const start = startInput.value;
            const end = endInput.value;
            
            if (!start || !end || !villa) return false;

            const conflict = allBookings.some(booking => {
                if (booking.villa !== villa) return false;
                
                const bookingStart = new Date(booking.start_date);
                const bookingEnd = new Date(booking.end_date);
                const checkStart = new Date(start);
                const checkEnd = new Date(end);
                
                return (checkStart < bookingEnd && checkEnd > bookingStart);
            });

            if (conflict) {
                conflictWarning.classList.add('show');
                addBtn.disabled = true;
            } else {
                conflictWarning.classList.remove('show');
                addBtn.disabled = false;
            }
            
            return conflict;
        }

        // Load bookings
        async function loadBookings() {
            try {
                const { data, error } = await supabaseClient
                    .from("bookings")
                    .select("*")
                    .order("start_date", { ascending: true });

                if (error) {
                    showError('Failed to load bookings: ' + error.message);
                    return;
                }

                allBookings = data || [];
                updateStats();
                renderCurrentView();
                checkConflicts();
                
            } catch (err) {
                showError('Failed to connect to database');
            }
        }

        // Update stats
        function updateStats() {
            const villa1 = allBookings.filter(b => b.villa === 'Villa 1 - Jasmin').length;
            const villa2 = allBookings.filter(b => b.villa === 'Villa 2 - Orchid').length;
            const villa3 = allBookings.filter(b => b.villa === 'Villa 3 - Rose').length;
            
            document.getElementById('villa1-count').textContent = villa1;
            document.getElementById('villa2-count').textContent = villa2;
            document.getElementById('villa3-count').textContent = villa3;
        }

        // Add booking
        async function addBooking() {
            try {
                const name = nameInput.value.trim();
                const villa = villaSelect.value;
                const start = startInput.value;
                const end = endInput.value;

                if (!name) {
                    showError('Please enter guest name');
                    return;
                }

                if (!start || !end) {
                    showError('Please select dates');
                    return;
                }

                const startDate = new Date(start);
                const endDate = new Date(end);
                
                if (endDate <= startDate) {
                    showError('Check-out must be after check-in');
                    return;
                }

                if (checkConflicts()) {
                    showError('Cannot add: Villa is already booked for these dates');
                    return;
                }

                const { error } = await supabaseClient
                    .from("bookings")
                    .insert([{
                        guest_name: name,
                        villa: villa,
                        start_date: start,
                        end_date: end
                    }]);

                if (error) {
                    showError('Failed to add booking: ' + error.message);
                    return;
                }

                showSuccess('Booking added successfully!');

                nameInput.value = '';
                
                const newToday = new Date();
                const newTomorrow = new Date(newToday);
                newTomorrow.setDate(newTomorrow.getDate() + 1);
                startInput.value = newToday.toISOString().split('T')[0];
                endInput.value = newTomorrow.toISOString().split('T')[0];
                
                await loadBookings();
                
            } catch (err) {
                showError('An unexpected error occurred');
            }
        }

        // Delete booking
        async function deleteBooking(id) {
            closeModal();
            
            try {
                const { error } = await supabaseClient
                    .from("bookings")
                    .delete()
                    .eq("id", id);

                if (error) {
                    showError('Failed to delete booking');
                    return;
                }

                showSuccess('Booking deleted');
                await loadBookings();
                
            } catch (err) {
                showError('Failed to delete booking');
            }
        }

        // Render calendar with fixed vertical centering
        function renderCalendar() {
            const dates = [];
            const today = new Date();
            for (let i = 0; i < 14; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                dates.push(date);
            }

            const villas = [
                { name: 'Villa 1 - Jasmin', display: 'Jasmin', icon: '🌸' },
                { name: 'Villa 2 - Orchid', display: 'Orchid', icon: '🌺' },
                { name: 'Villa 3 - Rose', display: 'Rose', icon: '🌹' }
            ];
            
            const villaColors = ['villa1', 'villa2', 'villa3'];

            let html = '<thead><tr><th>Villa</th>';

            dates.forEach(date => {
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const dayNum = date.getDate();
                const month = date.toLocaleDateString('en-US', { month: 'short' });
                html += `<th>${dayName}<br><span style="font-weight:400; font-size:0.65rem; color:#94a3b8;">${month} ${dayNum}</span></th>`;
            });
            html += '</tr></thead><tbody>';

            villas.forEach((villa, villaIndex) => {
                html += '<tr>';
                
                // Fixed villa cell with vertical centering
                html += `<td class="villa-cell"><div class="villa-cell-content"><span class="villa-name">${villa.icon} ${villa.display}</span></div></td>`;

                dates.forEach(date => {
                    const dateStr = date.toISOString().split('T')[0];
                    
                    const dayBookings = allBookings.filter(b => 
                        b.villa === villa.name && 
                        dateStr >= b.start_date && 
                        dateStr <= b.end_date
                    );

                    html += '<td>';
                    html += '<div class="bookings-container">';

                    if (dayBookings.length > 0) {
                        dayBookings.forEach(booking => {
                            const isStart = dateStr === booking.start_date;
                            
                            html += `<div class="calendar-booking ${villaColors[villaIndex]}" onclick="openModal(${booking.id})" title="Click for details">`;
                            if (isStart) html += '📌 ';
                            html += booking.guest_name.length > 8 ? booking.guest_name.substring(0, 6) + '…' : booking.guest_name;
                            html += '</div>';
                        });
                    } else {
                        html += '<div style="height: 22px;"></div>';
                    }

                    html += '</div>';
                    html += '</td>';
                });

                html += '</tr>';
            });

            html += '</tbody>';
            calendarTable.innerHTML = html;
        }

        // Render timeline
        function renderTimeline() {
            if (allBookings.length === 0) {
                timelineGrid.innerHTML = '<div class="empty-state">✨ No bookings yet — add your first reservation</div>';
                return;
            }

            const villas = [
                { name: 'Villa 1 - Jasmin', display: 'Jasmin', icon: '🌸', class: 'villa1' },
                { name: 'Villa 2 - Orchid', display: 'Orchid', icon: '🌺', class: 'villa2' },
                { name: 'Villa 3 - Rose', display: 'Rose', icon: '🌹', class: 'villa3' }
            ];
            
            let html = '<div class="timeline-header"><div style="width:100px"></div><div>Upcoming stays</div></div>';

            villas.forEach(villa => {
                const villaBookings = allBookings
                    .filter(b => b.villa === villa.name)
                    .sort((a, b) => new Date(a.start_date) - new Date(b.start_date));

                if (villaBookings.length === 0) return;

                html += '<div class="timeline-row">';
                html += `<div class="timeline-villa">${villa.icon} ${villa.display}</div>`;
                html += '<div class="timeline-bars">';

                villaBookings.forEach(booking => {
                    const start = new Date(booking.start_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    const end = new Date(booking.end_date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
                    
                    html += `<div class="timeline-bar ${villa.class}" onclick="openModal(${booking.id})" title="Click for details">`;
                    html += `<span class="date-badge">${start} → ${end}</span>`;
                    html += booking.guest_name.length > 12 ? booking.guest_name.substring(0, 10) + '…' : booking.guest_name;
                    html += '</div>';
                });

                html += '</div></div>';
            });

            timelineGrid.innerHTML = html;
        }

        // Render current view
        function renderCurrentView() {
            if (currentView === 'calendar') {
                renderCalendar();
            } else {
                renderTimeline();
            }
        }

        // Switch view
        function switchView(view) {
            currentView = view;
            
            document.querySelectorAll('.view-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-view="${view}"]`).classList.add('active');
            
            calendarView.style.display = view === 'calendar' ? 'block' : 'none';
            timelineView.style.display = view === 'timeline' ? 'block' : 'none';
            
            renderCurrentView();
        }

        // Modal delete handler
        modalDeleteBtn.addEventListener('click', () => {
            if (selectedBookingId) {
                deleteBooking(selectedBookingId);
            }
        });

        // Close modal when clicking overlay
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                closeModal();
            }
        });

        // Event listeners
        addBtn.addEventListener('click', addBooking);
        
        villaSelect.addEventListener('change', checkConflicts);
        startInput.addEventListener('change', checkConflicts);
        endInput.addEventListener('change', checkConflicts);
        
        document.querySelectorAll('.view-tab').forEach(tab => {
            tab.addEventListener('click', () => switchView(tab.dataset.view));
        });

        // Make functions available globally
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.deleteBooking = deleteBooking;
        window.addBooking = addBooking;

        // Initialize
        loadBookings();
    </script>
</body>
</html>
